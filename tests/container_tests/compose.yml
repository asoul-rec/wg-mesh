name: wg_mesh_test
services:
  node1:
    build:
      context: ../..
      dockerfile: release/Dockerfile_dev
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./runtime_conf/config1.json:/app/config.json
    networks:
      main:
        ipv4_address: 172.20.123.1
        interface_name: eth0
        gw_priority: 1
      extra:
        ipv4_address: 172.20.124.1
        interface_name: eth1

  node2:
    build:
      context: ../..
      dockerfile: release/Dockerfile_dev
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./runtime_conf/config2.json:/app/config.json
    networks:
      main:
        ipv4_address: 172.20.123.2
      extra:
        ipv4_address: 172.20.124.2

  node3:
    build:
      context: ../..
      dockerfile: release/Dockerfile_dev
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./runtime_conf/config3.json:/app/config.json
    networks:
      main:
        ipv4_address: 172.20.123.3
        interface_name: eth0
        gw_priority: 1
      extra:
        ipv4_address: 172.20.124.3
        interface_name: eth1

  node4:
    build:
      context: ../..
      dockerfile: release/Dockerfile_dev
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./runtime_conf/config4.json:/app/config.json
    networks:
      main:
        ipv4_address: 172.20.123.4
      extra:
        ipv4_address: 172.20.124.4

  node5:
    build:
      context: ../..
      dockerfile: release/Dockerfile_dev
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./runtime_conf/config5.json:/app/config.json
    command: sh -c 'echo "Node 5 sleeping for 5s to let meshes form..." && sleep 5 && exec python -m mesh --config /app/config.json -vv'
    networks:
      main:
        ipv4_address: 172.20.123.5
      extra:
        ipv4_address: 172.20.124.5

networks:
  main:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.123.0/24
          gateway: 172.20.123.234
  extra:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.124.0/24
          gateway: 172.20.124.234
